<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Background</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Antic+Slab&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap');

    body{
      height: 100vh;
      background-image: 
      linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 50%,rgba(0, 0, 0, 0.1)), 
      url(https://picsum.photos/id/25/500/300.jpg?blur=2);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size:cover;
    }
    
    blockquote{
      width: 30%;
      margin: 50px auto;
    }
    .judul2{
      background-image: linear-gradient(to bottom, rgba(125, 79, 90) 10%, rgb(193, 115, 133) );
      background-clip:text;
      filter: drop-shadow(0px 0px 4px rgba(255, 255, 0, 0.5));
      color: transparent;
      text-align: center;
      font: italic bolder 30px "Antic Slab", serif;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
  }
  .steveQuote{
    font-family: "Space Mono", monospace;
    letter-spacing: 4px;
    text-align: center;
    line-height: 30px;
    color: white;
    background-color: rgba(255, 255, 255, 0.2);
    box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 20px;
  }
  cite{
    display: block;
    font-family: "Space Mono", monospace;
    text-align: center;
    letter-spacing: 6px;
    color: #2a2a2a;
    border-top: 2px solid rgb(42, 42, 42, 0.5);
    width: 30%;
    margin: 30px auto;
    padding-top: 10px;
  }
  span{
    font-weight: bolder;
    color: #0000ff;
    text-shadow: 2px 2px 3px rgba(10, 30, 247, 0.5);
  }
  </style>
</head>
<body>
  <blockquote>
    <h1 class="judul2">Fase Berkembang</h1>
    <p class="steveQuote">"Belajar coding adalah perjalanan yang penuh dengan kesalahan, tetapi setiap kesalahan adalah pelajaran untuk <span>"kemajuan"</span></p>
  </blockquote>
  <cite> - Steve Jobs. CEO Apple Inc</cite>
</body>
</html>
