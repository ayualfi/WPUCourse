<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Background Gambar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Antic+Slab&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap');
    body{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    p{
      text-align: center;
      font:50px/1.5 "Quicksand", sans-serif;
    }
    .kotaklogo{
      margin: auto;
      border: 4px solid black;
      border-radius: 50%;
      width: 500px;
      height: 500px;
      background-image: 
      url(assets/ayualfi.png),
      url(assets/blob.png),
      url(assets/ombak.png);
      background-position: center, top, bottom;
      background-size:cover, contain, cover;
      background-repeat: no-repeat, no-repeat, no-repeat;
    }
  </style>
</head>
<body>
  <p>My Profil Card</p>
  <div class="kotaklogo"></div>
</body>
</html>
