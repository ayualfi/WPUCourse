<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Background</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Antic+Slab&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap');

    body{
      background-color: black;
    }
    
    blockquote{
      width: 30%;
      margin: auto;
    }
    .judul2{
    color: #ff0000;
    text-align: center;
    font: italic bold 24px "Antic Slab", serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration-line: underline;
    text-decoration-style:wavy;
    text-decoration-color: #79797a;
    text-shadow: 2px 2px 3px rgba(227, 38, 25, 0.5);
    margin-bottom: 20px;
  }
  .steveQuote{
    font-family: "Space Mono", monospace;
    letter-spacing: 4px;
    text-align: center;
    line-height: 30px;
    color: white;
  }
  cite{
    display: block;
    font-family: "Space Mono", monospace;
    text-align: center;
    letter-spacing: 6px;
    color: #79797a;
  }
  span{
    font-weight: bolder;
    color: #0000ff;
    text-shadow: 2px 2px 3px rgba(10, 30, 247, 0.5);
  }
  </style>
</head>
<body>
  <blockquote>
    <h1 class="judul2">Fase Berkembang</h1>
    <p class="steveQuote">"Belajar coding adalah perjalanan yang penuh dengan kesalahan, tetapi setiap kesalahan adalah pelajaran untuk <span>"kemajuan"</span></p>
    <cite> - Steve Jobs. CEO Apple Inc</cite>
  </blockquote>
</body>
</html>
