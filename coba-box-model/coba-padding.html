<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Margin</title>
  <!-- 
  # Urutan setiap element pada css = Content -> padding -> border -> outline -> margin
  ==> Padding : tidak bisa bernilai minus
  ==> Padding : jarak antara kontent dan border
  ==> Padding :  akan menambah total lebar sebuah elemen-->
  <style>
    body{
      margin: 0;
      padding: 0;
    }
    .kotak1{
      width: 300px;
      height: 300px;
      background-color: lightgreen;
      padding: 20px;
      /* short hand 
      ===> urutan jika ada 4 nilai : top -> right -> buttom -> left
      ===> urutan jika ada 3 nilai : top -> right&left -> buttom
      ===> urutan jika ada 2 nilai : top -> buttom
      ===> urutan jika ada 1 nilai : berlaku untuk top, buttom, left, and right*/
    }
  </style>
</head>
<body>
  <div class="kotak1">1</div>
</body>
</html>
