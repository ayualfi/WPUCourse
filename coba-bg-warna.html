<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Warna Background</title>
  <style>
    body{
      height: 100%;
      background-image: linear-gradient(to right, green 50%, red 30px, blue);
      height: 100vh;
    }
    .kotakwarna1{
      height: 200px;
      width: 250px;
      background-image: linear-gradient(black, white);
    }
    .kotakwarna2{
      height: 200px;
      width: 250px;
      background-image:radial-gradient(black, white);
    }
    .kotakwarna3{
      height: 200px;
      width: 250px;
      background-image:conic-gradient(black, white);
    }
  </style>
</head>
<body>
  <div class="kotakwarna1"></div>
  <div class="kotakwarna2"></div>
  <div class="kotakwarna3"></div>
</body>
</html>
